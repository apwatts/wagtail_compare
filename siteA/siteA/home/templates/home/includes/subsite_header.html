{% load static wagtailcore_tags %}
<header class="subsite-header subsite-header--{{ subsite_root.slug }}" data-subsite-header>
    <div class="subsite-header__inner">
        <div class="subsite-header__brand">
            <a class="subsite-header__crest-link" href="{% pageurl home_page|default:subsite_root %}">
                <span class="subsite-header__crest">
                    <img src="{% static 'img/mala.svg' %}" alt="{{ subsite_root.title }} logo">
                </span>
            </a>
            <a class="subsite-header__brand-text" href="{% pageurl subsite_root %}">
                <strong>{{ subsite_root.title }}</strong>
                <span>{{ current_site.site_name|default:"School Site" }}</span>
            </a>
        </div>
        <nav class="subsite-header__nav" aria-label="Subsite sections">
            <div class="subsite-header__menu-panel subsite-header__menu-panel--desktop">
                {% for item in nav_pages %}
                <a href="{% pageurl item.page %}">{{ item.label }}</a>
                {% empty %}
                <span class="subsite-header__nav-empty">Add sections</span>
                {% endfor %}
            </div>
            <details class="subsite-header__menu subsite-header__menu--mobile">
                <summary class="subsite-header__menu-toggle" aria-label="Toggle navigation menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </summary>
                <div class="subsite-header__menu-panel">
                    {% for item in nav_pages %}
                    <a href="{% pageurl item.page %}">{{ item.label }}</a>
                    {% empty %}
                    <span class="subsite-header__nav-empty">Add sections</span>
                    {% endfor %}
                </div>
            </details>
        </nav>
    </div>
</header>
